name: Deploy to FTP server

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run JS linter
        run: npm run lint:js

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Create .env from GitHub Secrets and Variables
        run: |
          # База данных
          echo "DB_HOST=${{ vars.DB_HOST }}" > .env
          echo "DB_USER=${{ vars.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_NAME=${{ vars.DB_NAME }}" >> .env
          echo "DB_PORT=${{ vars.DB_PORT }}" >> .env
          # Почта
          echo "MAILER_USER=${{ vars.MAILER_USER }}" >> .env
          echo "MAILER_PASSWORD=${{ secrets.MAILER_PASSWORD }}" >> .env
          echo "MAILER_HOST=${{ vars.MAILER_HOST }}" >> .env
          echo "MAILER_SSL=${{ vars.MAILER_SSL }}" >> .env
          echo "MAIL_FROM=${{ vars.MAIL_FROM }}" >> .env
          # Ссылки приложения
          echo "SPEC_LINK=${{ vars.SPEC_LINK }}" >> .env
          echo "CALCULATOR_LINK=${{ vars.CALCULATOR_LINK }}" >> .env
          echo "ORDER_EXPORT_LINK=${{ vars.ORDER_EXPORT_LINK }}" >> .env
          echo "EXPORT_ORDER_HZ_LINK=${{ vars.EXPORT_ORDER_HZ_LINK }}" >> .env
          echo "ANALYTICS_URL=${{ vars.ANALYTICS_URL }}" >> .env
          echo "ACTIVATION_URL=${{ vars.ACTIVATION_URL }}" >> .env
          echo "PRO_URL=${{ vars.PRO_URL }}" >> .env
          echo "DOCUMENTS_URL=${{ vars.DOCUMENTS_URL }}" >> .env
          echo "STATISTIC_LINK=${{ vars.STATISTIC_LINK }}" >> .env
          # Сервер
          echo "PORT=${{ vars.PORT }}" >> .env
          echo "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" >> .env
          echo "NODE_ENV=production" >> .env

      - name: Upload to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /web/current/
          exclude: |
            **/.git*
            **/.git*/**
            **/.vscode/**
            **/node_modules/**
            **/local_storage/**

      - name: Install dependencies and restart via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 18
            cd ${{ vars.APP_PATH }}
            npm ci --omit=dev
            APP="${{ vars.PM2_APP_NAME }}"
            if pm2 describe "$APP" > /dev/null 2>&1; then
              pm2 restart "$APP"
            else
              pm2 start app.js --name "$APP"
            fi
